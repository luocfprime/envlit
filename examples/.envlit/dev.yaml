# envlit/dev.yaml - Development environment configuration

extends: ./base.yaml

# Environment variables
env:
  # Inline flags — CLI overrides defined alongside the variable they control
  CUDA_VISIBLE_DEVICES:
    flag: ["--cuda", "-g"]
    default: "0"

  ML_COMPUTE_BACKEND:
    flag: ["--backend", "-b"]
    default: "c"
    map:
      c: "CPU"
      g: "GPU"
      t: "TPU"

  # Simple string values (shortcut for 'op: set')
  PROJECT_MODE: "Development"
  DEBUG: "true"
  LOG_LEVEL: "DEBUG"

  # Explicit set operation (equivalent to string value above)
  API_URL:
    op: set
    value: "http://localhost:8000"

  # Explicit unset operation
  PRODUCTION_KEY:
    op: unset

  # Path operations - list of operations (pipeline)
  PATH:
    - op: remove
      value: "/usr/local/old-tools"
    - op: prepend
      value: "./bin"
    - op: prepend
      value: "./scripts"

  # Path operations - single operation (also valid)
  LD_LIBRARY_PATH:
    op: prepend
    value: "./lib"

  # PYTHONPATH - pipeline example
  PYTHONPATH:
    - op: prepend
      value: "./src"
    - op: prepend
      value: "./lib"


# Lifecycle hooks
hooks:
  pre_load:
    - name: "Check dependencies"
      script: |
        echo "🐍 Checking dependencies..."
        if ! command -v python3 &> /dev/null; then
          echo "⚠️  Warning: python3 not found"
        fi

  post_load:
    - name: "Show configuration"
      script: |
        echo "🔧 Development environment loaded"
        echo "   MODE: $PROJECT_MODE"
        echo "   CUDA: $CUDA_VISIBLE_DEVICES"
        echo "   Backend: $ML_COMPUTE_BACKEND"

  pre_unload:
    - name: "Save state"
      script: "echo '💾 Saving development state...'"

  post_unload:
    - name: "Cleanup"
      script: "echo '✨ Development environment unloaded'"
